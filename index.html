<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niš Digital Twin — Hybrid GIS</title>

    <!-- ===== Leaflet (2D) ===== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- ===== CesiumJS (3D) ===== -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js">
    </script>
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" />

    <!-- ===== Chart.js (Графики) ===== -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <!-- ===== Font Awesome ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== КОНТЕЙНЕРЫ ===== */
        #cesiumContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #leafletContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: none;
        }

        .leaflet-control-zoom {
            display: none !important;
        }
        .leaflet-control-attribution {
            background: rgba(10, 14, 23, 0.8) !important;
            color: #667 !important;
            font-size: 9px !important;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 14, 23, 0.94);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: none;
            max-width: 96%;
        }

        .top-bar * {
            pointer-events: auto;
        }

        .top-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar .logo i {
            font-size: 24px;
            color: #4fc3f7;
        }

        .top-bar .logo h1 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #4fc3f7, #81c784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .top-bar .logo h1 small {
            font-size: 10px;
            color: #8892a0;
            -webkit-text-fill-color: #8892a0;
            font-weight: 400;
            margin-left: 4px;
        }

        .top-bar .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #81c784;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding-left: 14px;
        }

        .top-bar .status .dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* ===== КНОПКИ ПЕРЕКЛЮЧЕНИЯ ===== */
        .view-toggle {
            display: flex;
            gap: 4px;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding-left: 14px;
        }

        .view-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8892a0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .view-btn:hover {
            border-color: rgba(79, 195, 247, 0.3);
            color: #b0b8c4;
        }

        .view-btn.active {
            background: rgba(79, 195, 247, 0.2);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        /* ===== ПАНЕЛЬ ИНСТРУМЕНТОВ ===== */
        .tool-panel {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(10, 14, 23, 0.88);
            backdrop-filter: blur(8px);
            color: #b0b8c4;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .tool-btn:hover {
            background: rgba(79, 195, 247, 0.15);
            border-color: rgba(79, 195, 247, 0.3);
            color: #4fc3f7;
            transform: scale(1.05);
        }

        .tool-btn.active {
            background: rgba(79, 195, 247, 0.2);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        /* ===== КОМАНДНЫЙ ЦЕНТР (KPI) ===== */
        .command-center {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 96%;
        }

        .kpi-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #b0b8c4;
        }

        .kpi-item i {
            font-size: 16px;
            width: 22px;
            text-align: center;
        }

        .kpi-item .value {
            font-weight: 700;
            color: #e0e0e0;
            font-size: 15px;
            font-family: 'Courier New', monospace;
        }

        .kpi-item .trend {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
        }

        .trend.up {
            color: #81c784;
            background: rgba(129, 199, 132, 0.15);
        }
        .trend.down {
            color: #ef5350;
            background: rgba(239, 83, 80, 0.15);
        }
        .trend.stable {
            color: #ffb74d;
            background: rgba(255, 183, 77, 0.15);
        }

        /* ===== ИНФО-ПАНЕЛЬ ===== */
        .info-panel {
            position: absolute;
            bottom: 80px;
            left: 16px;
            z-index: 1000;
            background: rgba(10, 14, 23, 0.94);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 14px 18px;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            display: none;
        }

        .info-panel.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-panel .title {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 2px;
        }

        .info-panel .sub {
            font-size: 11px;
            color: #8892a0;
            margin-bottom: 6px;
        }

        .info-panel .detail {
            font-size: 12px;
            color: #b0b8c4;
            line-height: 1.8;
        }

        .info-panel .detail i {
            width: 18px;
            color: #4fc3f7;
        }

        .info-panel .detail .label {
            color: #667;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ===== МИНИ-ГРАФИК ===== */
        .mini-chart-container {
            position: absolute;
            top: 76px;
            right: 16px;
            z-index: 1000;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 10px 12px;
            width: 160px;
            height: 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .mini-chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 1024px) {
            .top-bar .status {
                display: none;
            }
            .mini-chart-container {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                top: 10px;
                padding: 8px 12px;
                gap: 8px;
            }
            .top-bar .logo h1 {
                font-size: 14px;
            }
            .top-bar .logo h1 small {
                font-size: 8px;
            }
            .view-btn {
                font-size: 9px;
                padding: 3px 8px;
            }
            .tool-panel {
                right: 10px;
                top: 80px;
                transform: none;
            }
            .tool-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .command-center {
                bottom: 12px;
                padding: 6px 12px;
                gap: 10px;
            }
            .kpi-item {
                font-size: 10px;
            }
            .kpi-item .value {
                font-size: 12px;
            }
            .kpi-item i {
                font-size: 13px;
                width: 18px;
            }
            .info-panel {
                left: 10px;
                bottom: 68px;
                max-width: 200px;
                padding: 10px 12px;
            }
            .info-panel .title {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .top-bar .logo i {
                font-size: 18px;
            }
            .top-bar .logo h1 {
                font-size: 12px;
            }
            .tool-btn {
                width: 30px;
                height: 30px;
                font-size: 11px;
            }
            .command-center {
                gap: 6px;
                padding: 4px 8px;
            }
            .kpi-item {
                font-size: 9px;
                gap: 4px;
            }
            .kpi-item .value {
                font-size: 10px;
            }
            .kpi-item i {
                font-size: 11px;
                width: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 3D КОНТЕЙНЕР (Cesium) ===== -->
    <div id="cesiumContainer"></div>

    <!-- ===== 2D КОНТЕЙНЕР (Leaflet) ===== -->
    <div id="leafletContainer"></div>

    <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
    <div class="top-bar">
        <div class="logo">
            <i class="fas fa-cube"></i>
            <h1>Niš Digital Twin <small>Hybrid GIS</small></h1>
        </div>

        <div class="status">
            <span class="dot"></span>
            <span>Online · Live</span>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" id="view3D" onclick="switchView('3d')">3D</button>
            <button class="view-btn" id="view2D" onclick="switchView('2d')">2D</button>
        </div>
    </div>

    <!-- ===== ПАНЕЛЬ ИНСТРУМЕНТОВ ===== -->
    <div class="tool-panel">
        <button class="tool-btn" id="btnZoomIn" title="Приближи"><i class="fas fa-plus"></i></button>
        <button class="tool-btn" id="btnZoomOut" title="Отдальи"><i class="fas fa-minus"></i></button>
        <button class="tool-btn" id="btnReset" title="Сброс"><i class="fas fa-home"></i></button>
        <button class="tool-btn" id="btnLocation" title="Моја локација"><i class="fas fa-location-dot"></i></button>
        <button class="tool-btn" id="btnAutoRotate" title="Автовращение"><i class="fas fa-sync-alt"></i></button>
        <button class="tool-btn" id="btnToggleTraffic" title="Трафик"><i class="fas fa-car"></i></button>
        <button class="tool-btn" id="btnToggleBuildings" title="Здания"><i class="fas fa-building"></i></button>
    </div>

    <!-- ===== МИНИ-ГРАФИК (AQI) ===== -->
    <div class="mini-chart-container">
        <canvas id="miniChart"></canvas>
    </div>

    <!-- ===== КОМАНДНЫЙ ЦЕНТР (KPI) ===== -->
    <div class="command-center" id="commandCenter">
        <div class="kpi-item">
            <i class="fas fa-thermometer-half" style="color:#ff6b6b;"></i>
            <span class="value" id="kpi-temp">23.5</span>°C
        </div>
        <div class="kpi-item">
            <i class="fas fa-wind" style="color:#4fc3f7;"></i>
            <span class="value" id="kpi-aqi">42</span> AQI
            <span class="trend up" id="kpi-aqi-trend">↑</span>
        </div>
        <div class="kpi-item">
            <i class="fas fa-car" style="color:#ffb74d;"></i>
            <span class="value" id="kpi-traffic">87</span>%
            <span class="trend down" id="kpi-traffic-trend">↓</span>
        </div>
        <div class="kpi-item">
            <i class="fas fa-bolt" style="color:#ffd700;"></i>
            <span class="value" id="kpi-energy">142</span> MW
            <span class="trend up" id="kpi-energy-trend">↑</span>
        </div>
        <div class="kpi-item">
            <i class="fas fa-water" style="color:#2196F3;"></i>
            <span class="value" id="kpi-water">4.8</span> m
            <span class="trend stable" id="kpi-water-trend">—</span>
        </div>
        <div class="kpi-item">
            <i class="fas fa-triangle-exclamation" style="color:#ef5350;"></i>
            <span class="value" id="kpi-incidents">3</span>
            <span class="trend down" id="kpi-incidents-trend">↓</span>
        </div>
        <div class="kpi-item">
            <i class="fas fa-users" style="color:#81c784;"></i>
            <span class="value" id="kpi-tourists">1,240</span>
            <span class="trend up" id="kpi-tourists-trend">↑</span>
        </div>
    </div>

    <!-- ===== ИНФО-ПАНЕЛЬ ===== -->
    <div class="info-panel" id="infoPanel">
        <div class="title" id="infoTitle">Нишка тврђава</div>
        <div class="sub" id="infoSub">🏛️ Културно наслеђе · XVIII век</div>
        <div class="detail" id="infoDetail">
            <i class="fas fa-map-pin"></i> <span id="infoCoords">43.3191°N, 21.8956°E</span><br>
            <i class="fas fa-users"></i> <span class="label">Посета</span>: <span id="infoVisitors">45,000</span>/год<br>
            <i class="fas fa-star" style="color:#FFD700;"></i> <span class="label">Оцена</span>: <span id="infoRating">4.8</span>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ===== СКРИПТ ===== -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentView = '3d';
        let cesiumViewer = null;
        let leafletMap = null;
        let miniChart = null;
        let autoRotate = false;
        let trafficEnabled = true;
        let buildingsEnabled = true;
        let transportEntities = [];
        let buildingPrimitives = [];
        let selectedObject = null;

        // ============================================================
        // 2. ДАННЫЕ
        // ============================================================
        const cityData = {
            buildings: [
                { id: 'B-001', name: 'Нишка тврђава', coords: [21.8956, 43.3191], height: 45, floors: 0,
                    type: 'fortress', energy: 'A', occupancy: 65, visitors: 45000, yearBuilt: 1720 },
                { id: 'B-002', name: 'Клинички центар', coords: [21.8900, 43.3300], height: 60, floors: 15,
                    type: 'hospital', energy: 'B+', occupancy: 78, visitors: 1200, yearBuilt: 2005 },
                { id: 'B-003', name: 'Универзитет Ниша', coords: [21.9050, 43.3250], height: 42, floors: 10,
                    type: 'education', energy: 'A', occupancy: 92, visitors: 30000, yearBuilt: 1998 },
                { id: 'B-004', name: 'ТЦ Форум', coords: [21.8850, 43.3350], height: 35, floors: 8, type: 'commerce',
                    energy: 'B', occupancy: 85, visitors: 8000, yearBuilt: 2010 },
                { id: 'B-005', name: 'Железничка станица', coords: [21.8800, 43.3150], height: 25, floors: 3,
                    type: 'transport', energy: 'C', occupancy: 60, visitors: 5000, yearBuilt: 1975 },
                { id: 'B-006', name: 'Градска скупштина', coords: [21.8950, 43.3200], height: 38, floors: 9,
                    type: 'government', energy: 'B+', occupancy: 70, visitors: 300, yearBuilt: 1965 },
                { id: 'B-007', name: 'Споменик Челе-Кула', coords: [21.9123, 43.3356], height: 12, floors: 0,
                    type: 'monument', energy: 'D', occupancy: 0, visitors: 20000, yearBuilt: 1809 },
                { id: 'B-008', name: 'Парк Св. Саве', coords: [21.8990, 43.3280], height: 5, floors: 0, type: 'park',
                    energy: 'A+', occupancy: 95, visitors: 1500, yearBuilt: 1990 },
            ],
            sensors: [
                { id: 'S-001', name: 'Сензор A1', coords: [21.8950, 43.3200], pm25: 42, pm10: 55, no2: 23, o3: 18,
                    temp: 23.5 },
                { id: 'S-002', name: 'Сензор A2', coords: [21.9100, 43.3300], pm25: 38, pm10: 48, no2: 19, o3: 22,
                    temp: 24.1 },
                { id: 'S-003', name: 'Сензор A3', coords: [21.8800, 43.3050], pm25: 45, pm10: 60, no2: 31, o3: 14,
                    temp: 22.8 },
                { id: 'S-004', name: 'Сензор A4', coords: [21.9000, 43.3400], pm25: 35, pm10: 42, no2: 16, o3: 25,
                    temp: 24.5 },
                { id: 'S-005', name: 'Сензор A5', coords: [21.9200, 43.3150], pm25: 40, pm10: 52, no2: 21, o3: 20,
                    temp: 23.2 },
            ],
            transport: [
                { id: 'T-001', name: 'Коридор Е75', coords: [
                        [21.8700, 43.3100],
                        [21.8956, 43.3191],
                        [21.9200, 43.3280]
                    ], type: 'highway', speed: 90 },
                { id: 'T-002', name: 'Бул. Цара Душана', coords: [
                        [21.8800, 43.3000],
                        [21.8956, 43.3191],
                        [21.9100, 43.3350]
                    ], type: 'road', speed: 50 },
                { id: 'T-003', name: 'Ул. Николе Пашића', coords: [
                        [21.8850, 43.3250],
                        [21.8956, 43.3191],
                        [21.9050, 43.3100]
                    ], type: 'road', speed: 40 },
            ],
            water: [
                { id: 'W-001', name: 'Нишава', coords: [
                        [21.8700, 43.3100],
                        [21.8956, 43.3191],
                        [21.9100, 43.3250],
                        [21.9300, 43.3300]
                    ], type: 'river' }
            ]
        };

        // ============================================================
        // 3. ИНИЦИАЛИЗАЦИЯ Cesium (3D)
        // ============================================================
        function initCesium() {
            Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYzQzNmFjOC1hYjg5LTRlNzItYmZiYi04YTA5NjUwMTA4NTgiLCJpZCI6Mjg1Niwic2NvcGVzIjpbImFzciIsImdjIl0sImlhdCI6MTU0NzA3ODEzMX0.tS1t_6F3EL-7TZ7jO_lGjs6It55Dqk5Ubo3u59pjEY0';

            cesiumViewer = new Cesium.Viewer('cesiumContainer', {
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                sceneModePicker: false,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: false,
                infoBox: false,
                selectionIndicator: false,
                terrain: Cesium.Terrain.fromWorldTerrain(),
                imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                }),
                skyBox: false,
                backgroundColor: Cesium.Color.fromCssColorString('#0a0e17')
            });

            // Настройка сцены
            const scene = cesiumViewer.scene;
            scene.globe.enableLighting = true;
            scene.globe.baseColor = Cesium.Color.fromCssColorString('#1a1f2e');
            scene.backgroundColor = Cesium.Color.fromCssColorString('#0a0e17');

            // Камера над Нишем
            cesiumViewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 1800),
                orientation: {
                    heading: Cesium.Math.toRadians(10),
                    pitch: Cesium.Math.toRadians(-35),
                    roll: 0
                },
                duration: 2
            });

            // Создаём здания
            createBuildings3D();

            // Создаём транспорт
            createTransport3D();

            // Создаём водную поверхность
            createWater3D();

            // Обработка кликов
            setupCesiumPicking();

            // Автовращение
            setupAutoRotate();

            console.log('✅ Cesium 3D инициализирован');
        }

        // ============================================================
        // 4. СОЗДАНИЕ 3D ЗДАНИЙ
        // ============================================================
        function createBuildings3D() {
            cityData.buildings.forEach((data, index) => {
                const position = Cesium.Cartesian3.fromDegrees(
                    data.coords[0] + (Math.random() - 0.5) * 0.002,
                    data.coords[1] + (Math.random() - 0.5) * 0.002,
                    0
                );

                // Высота здания
                const height = data.type === 'fortress' ? 20 :
                    data.type === 'monument' ? 10 :
                    data.type === 'park' ? 3 :
                    data.height || 30;

                const width = 20 + Math.random() * 30;
                const depth = 15 + Math.random() * 25;

                // Цвет в зависимости от типа
                const colors = {
                    fortress: '#FF9800',
                    hospital: '#9C27B0',
                    education: '#4CAF50',
                    commerce: '#2196F3',
                    transport: '#f44336',
                    government: '#4fc3f7',
                    monument: '#FF9800',
                    park: '#4CAF50'
                };
                const color = Cesium.Color.fromCssColorString(colors[data.type] || '#4fc3f7');

                // Создаём примитив
                const primitive = new Cesium.Primitive({
                    geometryInstances: new Cesium.GeometryInstance({
                        geometry: new Cesium.BoxGeometry({
                            minimum: new Cesium.Cartesian3(-width / 2, -depth / 2, 0),
                            maximum: new Cesium.Cartesian3(width / 2, depth / 2, height)
                        }),
                        modelMatrix: Cesium.Transforms.eastNorthUpToFixedFrame(position),
                        id: {
                            buildingId: data.id,
                            name: data.name,
                            type: data.type,
                            floors: data.floors,
                            energy: data.energy,
                            occupancy: data.occupancy,
                            visitors: data.visitors,
                            yearBuilt: data.yearBuilt
                        }
                    }),
                    appearance: new Cesium.PerInstanceColorAppearance({
                        flat: false,
                        translucent: false,
                        renderState: {
                            depthTest: { enabled: true }
                        }
                    })
                });

                // Материал с цветом
                primitive.appearance.material = new Cesium.Material({
                    fabric: {
                        type: 'Color',
                        uniforms: {
                            color: color
                        }
                    }
                });

                // Добавляем в сцену
                cesiumViewer.scene.primitives.add(primitive);
                buildingPrimitives.push(primitive);

                // Добавляем метку
                const label = new Cesium.Entity({
                    position: Cesium.Cartesian3.fromDegrees(
                        data.coords[0],
                        data.coords[1],
                        height + 10
                    ),
                    label: {
                        text: data.name,
                        font: '14px Segoe UI, sans-serif',
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -10),
                        scale: 0.8,
                        showBackground: true,
                        backgroundColor: Cesium.Color.fromCssColorString('rgba(10,14,23,0.7)'),
                        backgroundPadding: new Cesium.Cartesian2(6, 4)
                    }
                });
                cesiumViewer.entities.add(label);
            });
        }

        // ============================================================
        // 5. СОЗДАНИЕ 3D ТРАНСПОРТА (ПОЛНОСТЬЮ ПЕРЕПИСАННАЯ)
        // ============================================================
        function createTransport3D() {
            // Цвета для разных дорог
            const roadColors = {
                'Коридор Е75': '#ff6b6b',
                'Бул. Цара Душана': '#4ecdc4',
                'Ул. Николе Пашића': '#ffe66d'
            };

            cityData.transport.forEach((road) => {
                // Создаём полилинию через Entity (более простой и надёжный способ)
                const positions = [];
                road.coords.forEach(c => {
                    positions.push(c[0]);
                    positions.push(c[1]);
                    positions.push(1); // высота
                });

                const polylineEntity = new Cesium.Entity({
                    polyline: {
                        positions: Cesium.Cartesian3.fromDegreesArrayHeights(positions),
                        width: 6,
                        material: Cesium.Color.fromCssColorString(roadColors[road.name] || '#f44336'),
                        clampToGround: true
                    },
                    properties: {
                        type: 'road',
                        name: road.name
                    }
                });
                
                cesiumViewer.entities.add(polylineEntity);
                transportEntities.push(polylineEntity);
            });

            // Добавляем движущиеся машины
            for (let i = 0; i < 15; i++) {
                const lat = 43.310 + Math.random() * 0.025;
                const lon = 21.880 + Math.random() * 0.035;
                const entity = new Cesium.Entity({
                    position: Cesium.Cartesian3.fromDegrees(lon, lat, 1.5),
                    billboard: {
                        image: 'data:image/svg+xml,' + encodeURIComponent(
                            `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                                <rect x="2" y="6" width="20" height="12" rx="2" fill="#4fc3f7" stroke="#fff" stroke-width="1"/>
                                <circle cx="7" cy="15" r="3" fill="#0a0e17" stroke="#fff" stroke-width="1"/>
                                <circle cx="17" cy="15" r="3" fill="#0a0e17" stroke="#fff" stroke-width="1"/>
                                <rect x="8" y="8" width="8" height="4" rx="1" fill="rgba(255,255,255,0.3)"/>
                            </svg>`
                        ),
                        scale: 0.6,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
                    }
                });
                cesiumViewer.entities.add(entity);
                transportEntities.push(entity);

                // Храним скорость и направление
                entity._speed = 0.00003 + Math.random() * 0.00004;
                entity._direction = Math.random() > 0.5 ? 1 : -1;
                entity._startLon = lon;
                entity._startLat = lat;
                entity._rangeLon = 0.01 + Math.random() * 0.02;
                entity._rangeLat = 0.005 + Math.random() * 0.01;
            }

            // Анимация транспорта
            animateTransport();
        }

        function animateTransport() {
            function step() {
                if (!trafficEnabled) {
                    requestAnimationFrame(step);
                    return;
                }

                transportEntities.forEach(entity => {
                    if (entity._speed) {
                        const pos = entity.position.getValue(new Cesium.JulianDate());
                        if (pos) {
                            const cart = Cesium.Cartographic.fromCartesian(pos);
                            let newLon = cart.longitude + entity._speed * entity._direction;
                            let newLat = cart.latitude + entity._speed * 0.3 * (Math.random() - 0.5);

                            // Границы движения
                            if (newLon > 21.92 || newLon < 21.87) entity._direction *= -1;
                            if (newLat > 43.33 || newLat < 43.30) entity._direction *= -1;

                            entity.position = Cesium.Cartesian3.fromRadians(newLon, newLat, 1.5);

                            // Поворот автомобиля
                            const heading = Math.atan2(
                                Math.sin(newLon - cart.longitude),
                                Math.cos(newLat - cart.latitude)
                            );
                            entity.billboard.rotation = heading;
                        }
                    }
                });

                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // ============================================================
        // 6. СОЗДАНИЕ 3D ВОДЫ
        // ============================================================
        function createWater3D() {
            const waterCoords = cityData.water[0].coords.map(c => {
                return Cesium.Cartesian3.fromDegrees(c[0], c[1], 0.5);
            });

            // Полигон воды
            const waterGeometry = new Cesium.PolygonGeometry({
                polygonHierarchy: new Cesium.PolygonHierarchy(waterCoords),
                height: 0.5,
                extrudedHeight: 0.5,
                vertexFormat: Cesium.PerInstanceColorAppearance.VERTEX_FORMAT
            });

            const water = new Cesium.Primitive({
                geometryInstances: new Cesium.GeometryInstance({
                    geometry: waterGeometry,
                    id: { type: 'water' }
                }),
                appearance: new Cesium.PerInstanceColorAppearance({
                    flat: true,
                    translucent: true,
                    renderState: {
                        blending: Cesium.BlendingState.ALPHA_BLEND,
                        depthTest: { enabled: true }
                    }
                })
            });

            // Синий с прозрачностью
            water.appearance.material = new Cesium.Material({
                fabric: {
                    type: 'Color',
                    uniforms: {
                        color: new Cesium.Color(0.13, 0.55, 0.95, 0.6)
                    }
                }
            });

            cesiumViewer.scene.primitives.add(water);

            // Анимация уровня воды
            animateWater(water);
        }

        function animateWater(waterPrimitive) {
            let waterLevel = 4.8;

            function step() {
                waterLevel += (Math.random() - 0.5) * 0.02;
                waterLevel = Math.max(4.0, Math.min(5.5, waterLevel));
                document.getElementById('kpi-water').textContent = waterLevel.toFixed(1);

                // Обновляем высоту воды
                if (waterPrimitive.geometryInstances) {
                    const instances = waterPrimitive.geometryInstances;
                    if (Array.isArray(instances)) {
                        instances.forEach(instance => {
                            if (instance.geometry && instance.geometry._height !== undefined) {
                                instance.geometry._height = waterLevel;
                            }
                        });
                    }
                }

                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // ============================================================
        // 7. ОБРАБОТКА КЛИКОВ В 3D
        // ============================================================
        function setupCesiumPicking() {
            const handler = new Cesium.ScreenSpaceEventHandler(cesiumViewer.scene.canvas);

            handler.setInputAction(function(click) {
                const picked = cesiumViewer.scene.pick(click.position);
                if (Cesium.defined(picked) && picked.primitive) {
                    const id = picked.primitive._id || picked.primitive.id;
                    if (id && id.buildingId) {
                        showInfoPanel3D(id);
                    }
                } else {
                    document.getElementById('infoPanel').classList.remove('visible');
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

            // Изменение курсора
            handler.setInputAction(function(move) {
                const picked = cesiumViewer.scene.pick(move.endPosition);
                cesiumViewer.scene.canvas.style.cursor =
                    Cesium.defined(picked) && picked.primitive ? 'pointer' : 'default';
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
        }

        function showInfoPanel3D(data) {
            const panel = document.getElementById('infoPanel');
            document.getElementById('infoTitle').textContent = data.name || 'Здание';
            document.getElementById('infoSub').textContent =

                (data.yearBuilt ? ' · ' + data.yearBuilt : '');

            let detail = `<i class="fas fa-map-pin"></i> ${data.buildingId || '—'}<br>`;
            if (data.floors) {
                detail += `<i class="fas fa-layer-group"></i> Этажей: ${data.floors}<br>`;
            }
            if (data.energy) {
                detail += `<i class="fas fa-bolt"></i> Энергоэффективность: ${data.energy}<br>`;
            }
            if (data.occupancy) {
                detail += `<i class="fas fa-users"></i> Загрузка: ${data.occupancy}%<br>`;
            }
            if (data.visitors) {
                detail += `<i class="fas fa-flag"></i> Посещаемость: ${data.visitors.toLocaleString()}/год`;
            }

            document.getElementById('infoDetail').innerHTML = detail;

        // ============================================================
        // 8. АВТОВРАЩЕНИЕ
        // ============================================================
        function setupAutoRotate() {
            document.getElementById('btnAutoRotate').addEventListener('click', function() {
                autoRotate = !autoRotate;
                this.classList.toggle('active');
                if (autoRotate) {
                    startAutoRotate();
                }
            });
        }

        function startAutoRotate() {
            function step() {
                if (!autoRotate) return;
                const camera = cesiumViewer.camera;
                const position = camera.position;
                const center = Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 0);
                const radius = Cesium.Cartesian3.distance(position, center);

                if (radius > 100) {
                    const heading = camera.heading + 0.005;
                    camera.lookAt(center, new Cesium.Cartesian3(
                        radius * Math.sin(heading),
                        radius * Math.cos(heading),
                        camera.position.z
                    ));
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // ============================================================
        // 9. ИНИЦИАЛИЗАЦИЯ Leaflet (2D)
        // ============================================================
        function initLeaflet() {
            leafletMap = L.map('leafletContainer', {
                center: [43.3191, 21.8956],
                zoom: 14,
                zoomControl: false,
                attributionControl: true
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 10
            }).addTo(leafletMap);

            // Добавляем маркеры объектов
            const markerData = [
                ...cityData.buildings.map(b => ({ ...b, category: 'Здание' })),
                ...cityData.sensors.map(s => ({ ...s, category: 'Сенсор' })),
            ];

            const markers = L.layerGroup();

            markerData.forEach(item => {
                const popup = `
                    <div style="font-family: 'Segoe UI', sans-serif; color:#0a0e17; max-width:200px;">
                        <h4 style="margin:0 0 2px 0;">${item.name}</h4>
                        <div style="font-size:11px; color:#666;">${item.category || item.type || ''}</div>
                        ${item.pm25 ? `<div style="font-size:11px; color:#888;">PM2.5: ${item.pm25} · PM10: ${item.pm10}</div>` : ''}
                        ${item.visitors ? `<div style="font-size:11px; color:#888;">Посещаемость: ${item.visitors.toLocaleString()}</div>` : ''}
                    </div>
                `;

                const color = item.type === 'fortress' || item.type === 'monument' ? '#FF9800' :
                    item.type === 'hospital' ? '#9C27B0' :
                    item.type === 'education' ? '#4CAF50' :
                    item.type === 'commerce' ? '#2196F3' :
                    item.type === 'transport' ? '#f44336' :
                    item.pm25 ? '#00BCD4' :
                    '#4fc3f7';

                const marker = L.circleMarker([item.coords[1], item.coords[0]], {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).bindPopup(popup);

                marker.on('click', function() {
                    showInfoPanel2D(item);
                });

                markers.addLayer(marker);
            });

            markers.addTo(leafletMap);

            // Добавляем линии транспорта
            cityData.transport.forEach(road => {
                const coords = road.coords.map(c => [c[1], c[0]]);
                const line = L.polyline(coords, {
                    color: '#f44336',
                    weight: 3,
                    opacity: 0.6
                }).bindPopup(`
                    <div style="font-family: 'Segoe UI', sans-serif;">
                        <h4 style="margin:0;">${road.name}</h4>
                        <div style="font-size:11px; color:#666;">${road.type}</div>
                    </div>
                `);
                line.addTo(leafletMap);
            });

            // Добавляем воду
            cityData.water.forEach(water => {
                const coords = water.coords.map(c => [c[1], c[0]]);
                const line = L.polyline(coords, {
                    color: '#2196F3',
                    weight: 4,
                    opacity: 0.5
                }).bindPopup(`
                    <div style="font-family: 'Segoe UI', sans-serif;">
                        <h4 style="margin:0;">${water.name}</h4>
                        <div style="font-size:11px; color:#666;">Река</div>
                    </div>
                `);
                line.addTo(leafletMap);
            });

            console.log('✅ Leaflet 2D инициализирован');
        }

        // ============================================================
        // 10. ПЕРЕКЛЮЧЕНИЕ МЕЖДУ 2D И 3D
        // ============================================================
        function switchView(view) {
            currentView = view;
            document.getElementById('view3D').classList.toggle('active', view === '3d');
            document.getElementById('view2D').classList.toggle('active', view === '2d');

            const cesiumContainer = document.getElementById('cesiumContainer');
            const leafletContainer = document.getElementById('leafletContainer');

            if (view === '3d') {
                cesiumContainer.style.display = 'block';
                leafletContainer.style.display = 'none';
                if (cesiumViewer) {
                    cesiumViewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 1800),
                        duration: 1
                    });
                }
            } else {
                cesiumContainer.style.display = 'none';
                leafletContainer.style.display = 'block';
                if (leafletMap) {
                    leafletMap.flyTo([43.3191, 21.8956], 14);
                }
            }
        }

        // ============================================================
        // 11. КОНТРОЛЫ
        // ============================================================
        function setupControls() {
            // Зум 3D
            document.getElementById('btnZoomIn').addEventListener('click', function() {
                if (currentView === '3d' && cesiumViewer) {
                    const camera = cesiumViewer.camera;
                    const pos = camera.position;
                    const center = Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 0);
                    const newPos = Cesium.Cartesian3.lerp(pos, center, 0.1, new Cesium.Cartesian3());
                    camera.flyTo({ destination: newPos, duration: 0.5 });
                } else if (currentView === '2d' && leafletMap) {
                    leafletMap.zoomIn();
                }
            });

            document.getElementById('btnZoomOut').addEventListener('click', function() {
                if (currentView === '3d' && cesiumViewer) {
                    const camera = cesiumViewer.camera;
                    const pos = camera.position;
                    const center = Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 0);
                    const dir = Cesium.Cartesian3.subtract(pos, center, new Cesium.Cartesian3());
                    const newPos = Cesium.Cartesian3.add(pos, dir, new Cesium.Cartesian3());
                    camera.flyTo({ destination: newPos, duration: 0.5 });
                } else if (currentView === '2d' && leafletMap) {
                    leafletMap.zoomOut();
                }
            });

            document.getElementById('btnReset').addEventListener('click', function() {
                if (currentView === '3d' && cesiumViewer) {
                    cesiumViewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(21.8956, 43.3191, 1800),
                        duration: 1
                    });
                } else if (currentView === '2d' && leafletMap) {
                    leafletMap.flyTo([43.3191, 21.8956], 14);
                }
                document.getElementById('infoPanel').classList.remove('visible');
            });

            // Моя локация
            document.getElementById('btnLocation').addEventListener('click', function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const lat = pos.coords.latitude;
                            const lon = pos.coords.longitude;
                            if (currentView === '3d' && cesiumViewer) {
                                cesiumViewer.camera.flyTo({
                                    destination: Cesium.Cartesian3.fromDegrees(lon, lat, 500),
                                    duration: 1
                                });
                            } else if (currentView === '2d' && leafletMap) {
                                leafletMap.flyTo([lat, lon], 16);
                            }
                        },
                        () => alert('Не удалось определить местоположение'),
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                } else {
                    alert('GPS не поддерживается');
                }
            });

            // Трафик
            document.getElementById('btnToggleTraffic').addEventListener('click', function() {
                trafficEnabled = !trafficEnabled;
                this.classList.toggle('active');
                transportEntities.forEach(entity => {
                    if (entity.show !== undefined) {
                        entity.show = trafficEnabled;
                    }
                });
            });

            // Здания
            document.getElementById('btnToggleBuildings').addEventListener('click', function() {
                buildingsEnabled = !buildingsEnabled;
                this.classList.toggle('active');
                buildingPrimitives.forEach(p => {
                    p.show = buildingsEnabled;
                });
            });
        }

        // ============================================================
        // 12. МИНИ-ГРАФИК (AQI)
        // ============================================================
        function initMiniChart() {
            const ctx = document.getElementById('miniChart').getContext('2d');

            // Генерируем данные AQI за 24 часа
            const data = [];
            for (let i = 0; i < 24; i++) {
                const base = 35 + Math.sin(i / 6) * 15;
                data.push(Math.max(15, Math.min(90, base + (Math.random() - 0.5) * 15)));
            }

            miniChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => `${i}:00`),
                    datasets: [{
                        label: 'AQI',
                        data: data,
                        borderColor: '#4fc3f7',
                        backgroundColor: 'rgba(79, 195, 247, 0.15)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `AQI: ${ctx.parsed.y}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { display: false }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { display: false },
                            min: 0,
                            max: 100
                        }
                    },
                    animation: {
                        duration: 500
                    }
                }
            });

            // Обновляем данные каждые 5 секунд
            setInterval(() => {
                if (miniChart) {
                    const newData = miniChart.data.datasets[0].data;
                    newData.shift();
                    const base = 35 + Math.sin(Date.now() / 60000) * 15;
                    newData.push(Math.max(15, Math.min(90, base + (Math.random() - 0.5) * 15)));
                    miniChart.update();
                }
            }, 5000);
        }

        // ============================================================
        // 13. ОБНОВЛЕНИЕ KPI
        // ============================================================
        function updateKPI() {
            // Температура
            const temp = (22 + Math.random() * 4).toFixed(1);
            document.getElementById('kpi-temp').textContent = temp;

            // AQI
            const aqi = Math.floor(30 + Math.random() * 30);
            document.getElementById('kpi-aqi').textContent = aqi;
            document.getElementById('kpi-aqi-trend').textContent = Math.random() > 0.5 ? '↑' : '↓';
            document.getElementById('kpi-aqi-trend').className = 'trend ' + (Math.random() > 0.5 ? 'up' : 'down');

            // Трафик
            const traffic = Math.floor(60 + Math.random() * 35);
            document.getElementById('kpi-traffic').textContent = traffic;
            document.getElementById('kpi-traffic-trend').textContent = Math.random() > 0.5 ? '↑' : '↓';
            document.getElementById('kpi-traffic-trend').className = 'trend ' + (Math.random() > 0.5 ? 'up' : 'down');

            // Энергия
            const energy = Math.floor(120 + Math.random() * 60);
            document.getElementById('kpi-energy').textContent = energy;
            document.getElementById('kpi-energy-trend').textContent = Math.random() > 0.5 ? '↑' : '↓';
            document.getElementById('kpi-energy-trend').className = 'trend ' + (Math.random() > 0.5 ? 'up' : 'down');

            // Инциденты
            const incidents = Math.floor(Math.random() * 5);
            document.getElementById('kpi-incidents').textContent = incidents;
            document.getElementById('kpi-incidents-trend').textContent = Math.random() > 0.5 ? '↑' : '↓';
            document.getElementById('kpi-incidents-trend').className = 'trend ' + (Math.random() > 0.5 ? 'up' : 'down');

            // Туристы
            const tourists = Math.floor(800 + Math.random() * 800);
            document.getElementById('kpi-tourists').textContent = tourists.toLocaleString();
            document.getElementById('kpi-tourists-trend').textContent = Math.random() > 0.5 ? '↑' : '↓';
            document.getElementById('kpi-tourists-trend').className = 'trend ' + (Math.random() > 0.5 ? 'up' : 'down');

            // Обновление мини-графика
            if (miniChart) {
                const newData = miniChart.data.datasets[0].data;
                newData.shift();
                const base = 35 + Math.sin(Date.now() / 60000) * 15;
                newData.push(Math.max(15, Math.min(90, base + (Math.random() - 0.5) * 15)));
                miniChart.update();
            }
        }

        // ============================================================
        // 14. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        function init() {
            // Сначала инициализируем Cesium
            initCesium();

            // Затем Leaflet
            initLeaflet();

            // Мини-график
            initMiniChart();

            // Контролы
            setupControls();

            // Обновляем KPI каждые 3 секунды
            setInterval(updateKPI, 3000);

            // Скрываем 2D по умолчанию
            document.getElementById('leafletContainer').style.display = 'none';

            console.log('🚀 Niš Digital Twin Hybrid GIS запущен!');
            console.log('📍 3D и 2D режимы доступны');
            console.log('📊 KPI обновляются в реальном времени');
            console.log('🏛️ Кликните по объекту для информации');

            // Показываем подсказку
            setTimeout(() => {
                const panel = document.getElementById('infoPanel');
                panel.classList.add('visible');
                document.getElementById('infoTitle').textContent = '👋 Добро пожаловать!';
                document.getElementById('infoSub').textContent = 'Niš Digital Twin Hybrid GIS';
                document.getElementById('infoDetail').innerHTML = `
                    <i class="fas fa-cube"></i> 3D-режим — нажмите на здание<br>
                    <i class="fas fa-map"></i> 2D-режим — кликните по маркеру<br>
                    <i class="fas fa-sync-alt"></i> Включите автовращение<br>
                    <i class="fas fa-thermometer-half"></i> Данные обновляются в реальном времени
                `;
                document.getElementById('infoCoords').textContent = '43.3191°N, 21.8956°E';

                setTimeout(() => {
                    panel.classList.remove('visible');
                }, 6000);
            }, 1500);
        }

        // ============================================================
        // 15. ЗАПУСК
        // ============================================================
        window.onload = function() {
            // Небольшая задержка для загрузки Cesium
            setTimeout(init, 500);
        };

        // Очистка ресурсов при закрытии
        window.onbeforeunload = function() {
            if (cesiumViewer) {
                cesiumViewer.destroy();
            }
        };

        console.log('📦 Niš Digital Twin Hybrid GIS загружается...');
        console.log('🔄 Используйте кнопки 3D/2D для переключения режимов');
    </script>
