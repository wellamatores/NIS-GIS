<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Niš Digital Twin v4.0 - CesiumJS</title>
    
    <!-- Leaflet CSS (для 2D) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- CesiumJS -->
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0e14; overflow: hidden; height: 100vh; color: #e8edf5; }
        
        #cesium-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #map.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* 2D элементы всегда поверх */
        #command-center, #toolbar, #legend, #info-panel, #timeline, #layer-modal {
            z-index: 1000;
            position: absolute;
            pointer-events: auto;
        }
        
        /* Командный центр */
        #command-center {
            top: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 80%;
        }
        .kpi-card {
            background: rgba(10, 16, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(80, 180, 255, 0.2);
            border-radius: 14px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            color: #c8d6e5;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .kpi-card:hover { transform: translateY(-2px); border-color: #4fc3f7; }
        .kpi-card i { font-size: 1.2rem; color: #4fc3f7; width: 24px; }
        .kpi-value { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .kpi-label { font-size: 0.7rem; opacity: 0.7; }
        .kpi-badge {
            background: #4fc3f7;
            color: #0b0e14;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.6rem;
            font-weight: 700;
            margin-left: 6px;
        }
        
        /* Панель инструментов */
        #toolbar {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(16, 22, 34, 0.8);
            backdrop-filter: blur(12px);
            padding: 14px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        #toolbar button {
            background: transparent;
            border: none;
            color: #b0c4de;
            font-size: 1.3rem;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }
        #toolbar button:hover { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; transform: scale(1.1); }
        #toolbar button.active { color: #4fc3f7; background: rgba(79, 195, 247, 0.15); }
        #toolbar button .tooltip {
            position: absolute;
            right: 52px;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            display: none;
            pointer-events: none;
        }
        #toolbar button:hover .tooltip { display: block; }
        
        /* Инфо-панель */
        #info-panel {
            bottom: 120px;
            right: 20px;
            width: 320px;
            background: rgba(12, 20, 32, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 18px 22px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8);
            max-height: 60vh;
            overflow-y: auto;
        }
        #info-panel.show { display: block; }
        #info-panel::-webkit-scrollbar { width: 4px; }
        #info-panel::-webkit-scrollbar-thumb { background: #4fc3f7; border-radius: 4px; }
        #info-panel h4 { color: #4fc3f7; margin-bottom: 8px; font-size: 1.1rem; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .info-row .label { opacity: 0.6; }
        .info-row .value { font-weight: 500; }
        #mini-chart-container { height: 70px; margin-top: 12px; }
        
        /* Временная шкала */
        #timeline {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 14, 24, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #timeline input[type="range"] {
            width: 200px;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #4fc3f7, #b388ff);
            border-radius: 4px;
            outline: none;
        }
        #timeline input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle, #4fc3f7, #b388ff);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.5);
        }
        .timeline-btn {
            background: transparent;
            border: none;
            color: #b0c4de;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .timeline-btn.active { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; }
        #year-label { font-weight: 600; color: #4fc3f7; min-width: 40px; text-align: center; }
        
        /* Легенда */
        #legend {
            bottom: 100px;
            left: 20px;
            background: rgba(10, 16, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; }
        
        /* Модальное окно */
        #layer-modal {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(12, 20, 32, 0.95);
            backdrop-filter: blur(20px);
            padding: 28px 34px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            width: 360px;
            display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        #layer-modal.show { display: block; }
        #layer-modal h3 { margin-bottom: 20px; color: #4fc3f7; }
        .layer-check { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
        .layer-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }
        .layer-check label { font-size: 1rem; cursor: pointer; }
        #modal-close {
            background: #4fc3f7;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #0b0e14;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.2s;
        }
        #modal-close:hover { background: #80d8ff; transform: scale(1.02); }
        
        /* Адаптив */
        @media (max-width: 768px) {
            #command-center { top: 10px; left: 10px; max-width: 95%; gap: 6px; }
            .kpi-card { padding: 4px 10px; font-size: 0.7rem; min-width: 70px; }
            #toolbar { right: 10px; padding: 10px 6px; gap: 6px; }
            #toolbar button { width: 34px; height: 34px; font-size: 1rem; }
            #timeline { bottom: 70px; padding: 6px 14px; gap: 10px; flex-wrap: wrap; justify-content: center; }
            #timeline input[type="range"] { width: 120px; }
            #info-panel { width: 240px; bottom: 140px; right: 10px; padding: 14px; }
            #legend { display: none; }
            #layer-modal { width: 90%; padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Cesium 3D Container -->
    <div id="cesium-container"></div>
    
    <!-- Leaflet 2D Container -->
    <div id="map"></div>
    
    <!-- Командный центр -->
    <div id="command-center">
        <div class="kpi-card">
            <i class="fas fa-thermometer-half"></i>
            <span>
                <span class="kpi-label">TEMP</span><br>
                <span class="kpi-value" id="kpi-temp">23°C</span>
            </span>
        </div>
        <div class="kpi-card">
            <i class="fas fa-wind"></i>
            <span>
                <span class="kpi-label">AQI</span><br>
                <span class="kpi-value" id="kpi-aqi">42</span>
                <span class="kpi-badge">LIVE</span>
            </span>
        </div>
        <div class="kpi-card">
            <i class="fas fa-car"></i>
            <span>
                <span class="kpi-label">TRAFFIC</span><br>
                <span class="kpi-value" id="kpi-traffic">78%</span>
            </span>
        </div>
        <div class="kpi-card">
            <i class="fas fa-bolt"></i>
            <span>
                <span class="kpi-label">ENERGY</span><br>
                <span class="kpi-value" id="kpi-energy">1.2MW</span>
            </span>
        </div>
        <div class="kpi-card">
            <i class="fas fa-water"></i>
            <span>
                <span class="kpi-label">WATER</span><br>
                <span class="kpi-value" id="kpi-water">4.8m</span>
            </span>
        </div>
        <div class="kpi-card">
            <i class="fas fa-exclamation-triangle"></i>
            <span>
                <span class="kpi-label">INCIDENTS</span><br>
                <span class="kpi-value" id="kpi-incidents">3</span>
            </span>
        </div>
    </div>
    
    <!-- Панель инструментов -->
    <div id="toolbar">
        <button id="btn-2d-toggle" title="Toggle 2D/3D">
            <i class="fas fa-layer-group"></i>
            <span class="tooltip">Switch to 2D</span>
        </button>
        <button id="btn-zoom-in" title="Zoom In">
            <i class="fas fa-plus"></i>
            <span class="tooltip">Zoom In</span>
        </button>
        <button id="btn-zoom-out" title="Zoom Out">
            <i class="fas fa-minus"></i>
            <span class="tooltip">Zoom Out</span>
        </button>
        <button id="btn-layers" title="Layers">
            <i class="fas fa-list"></i>
            <span class="tooltip">Layers</span>
        </button>
        <button id="btn-heat" title="Heatmap">
            <i class="fas fa-fire"></i>
            <span class="tooltip">Heatmap</span>
        </button>
        <button id="btn-animations" title="Animations" class="active">
            <i class="fas fa-play"></i>
            <span class="tooltip">Animations</span>
        </button>
        <button id="btn-shaders" title="Smart Materials">
            <i class="fas fa-paint-brush"></i>
            <span class="tooltip">Smart Materials</span>
        </button>
        <button id="btn-info-toggle" title="Info Panel">
            <i class="fas fa-info-circle"></i>
            <span class="tooltip">Info</span>
        </button>
    </div>
    
    <!-- Легенда -->
    <div id="legend">
        <div class="legend-item"><span class="legend-color" style="background:#4caf50;"></span> Parks</div>
        <div class="legend-item"><span class="legend-color" style="background:#42a5f5;"></span> Water</div>
        <div class="legend-item"><span class="legend-color" style="background:#ffb74d;"></span> Heritage</div>
        <div class="legend-item"><span class="legend-color" style="background:#ff8a65;"></span> Buildings</div>
        <div class="legend-item"><span class="legend-color" style="background:#ef5350;"></span> Incidents</div>
        <div class="legend-item"><span class="legend-color" style="background:#ab47bc;"></span> Sensors</div>
    </div>
    
    <!-- Инфо-панель -->
    <div id="info-panel">
        <h4 id="info-title">📍 City Center</h4>
        <div class="info-row"><span class="label">Coordinates</span><span class="value" id="info-coords">43.3209° N, 21.8958° E</span></div>
        <div class="info-row"><span class="label">Type</span><span class="value" id="info-type">🏛️ Mixed Use</span></div>
        <div class="info-row"><span class="label">Floors</span><span class="value" id="info-floors">12</span></div>
        <div class="info-row"><span class="label">Energy Class</span><span class="value" id="info-energy">A+</span></div>
        <div class="info-row"><span class="label">Occupancy</span><span class="value" id="info-occupancy">78%</span></div>
        <div class="info-row"><span class="label">Visitors</span><span class="value" id="info-visitors">👥 1,240 today</span></div>
        <div id="mini-chart-container"><canvas id="miniChart"></canvas></div>
    </div>
    
    <!-- Временная шкала -->
    <div id="timeline">
        <button class="timeline-btn active" id="mode-now">Now</button>
        <button class="timeline-btn" id="mode-history">History</button>
        <button class="timeline-btn" id="mode-forecast">Forecast</button>
        <input type="range" id="year-slider" min="2018" max="2030" value="2026" step="1">
        <span id="year-label">2026</span>
    </div>
    
    <!-- Модальное окно слоёв -->
    <div id="layer-modal">
        <h3><i class="fas fa-layer-group" style="margin-right:10px;"></i>Layers</h3>
        <div class="layer-check"><input type="checkbox" id="chk-buildings" checked><label>🏢 Buildings (3D)</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-parks" checked><label>🌳 Parks</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-water" checked><label>💧 Water</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-heritage" checked><label>🏛️ Heritage</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-transport" checked><label>🚌 Transport</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-sensors" checked><label>📡 Sensors</label></div>
        <div class="layer-check"><input type="checkbox" id="chk-incidents" checked><label>⚠️ Incidents</label></div>
        <button id="modal-close">Close</button>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    
    <script>
        (function() {
            // ============================================================
            // 1. ИНИЦИАЛИЗАЦИЯ CesiumJS
            // ============================================================
            const cesiumContainer = document.getElementById('cesium-container');
            const viewer = new Cesium.Viewer(cesiumContainer, {
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                sceneModePicker: false,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: false,
                infoBox: false,
                selectionIndicator: false,
                terrain: Cesium.Terrain.fromWorldTerrain(),
                imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                })
            });
            
            // Настройка камеры на Niš
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(21.8958, 43.3209, 500),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-25),
                    roll: 0
                }
            });
            
            viewer.scene.globe.enableLighting = true;
            viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#0b0e14');
            
            // ============================================================
            // 2. СОЗДАНИЕ 3D TILES С LOD (через генератор)
            // ============================================================
            function generateBuildingTileset() {
                // Имитация генератора 3D Tiles с LOD
                // В реальном проекте здесь загружается tileset.json
                
                const buildingData = [
                    { lon: 21.8958, lat: 43.3209, height: 45, width: 25, depth: 18, color: '#4fc3f7', type: 'office', floors: 12, energy: 'A+' },
                    { lon: 21.8924, lat: 43.3124, height: 20, width: 40, depth: 30, color: '#ffb74d', type: 'heritage', floors: 2, energy: 'C' },
                    { lon: 21.8892, lat: 43.3184, height: 15, width: 30, depth: 20, color: '#81c784', type: 'residential', floors: 4, energy: 'B' },
                    { lon: 21.9033, lat: 43.3245, height: 35, width: 20, depth: 15, color: '#ce93d8', type: 'commercial', floors: 10, energy: 'A' },
                    { lon: 21.8935, lat: 43.3216, height: 28, width: 22, depth: 16, color: '#ffa726', type: 'transport', floors: 6, energy: 'B+' },
                    { lon: 21.8990, lat: 43.3172, height: 40, width: 30, depth: 20, color: '#26c6da', type: 'medical', floors: 8, energy: 'A' },
                    { lon: 21.8871, lat: 43.3157, height: 12, width: 35, depth: 25, color: '#ffb74d', type: 'archaeological', floors: 1, energy: 'D' },
                    { lon: 21.9057, lat: 43.3198, height: 22, width: 18, depth: 14, color: '#ffa726', type: 'transport', floors: 4, energy: 'B' },
                ];
                
                const buildingGroup = [];
                
                buildingData.forEach((b, i) => {
                    const position = Cesium.Cartesian3.fromDegrees(b.lon, b.lat, 0);
                    
                    // Создаём здание с LOD (разные детализации)
                    const building = {
                        position: position,
                        height: b.height,
                        width: b.width,
                        depth: b.depth,
                        color: b.color,
                        metadata: {
                            buildingId: `B-${String(i+1).padStart(4, '0')}`,
                            type: b.type,
                            floors: b.floors,
                            energy: b.energy,
                            occupancy: Math.floor(60 + Math.random() * 35),
                            visitors: Math.floor(200 + Math.random() * 1500)
                        }
                    };
                    
                    // Создаём LOD-версии (разный уровень детализации)
                    // LOD0: Высокий полигонаж (с деталями)
                    const lod0 = createBuildingMesh(b, 0);
                    // LOD1: Средний полигонаж
                    const lod1 = createBuildingMesh(b, 1);
                    // LOD2: Низкий полигонаж (для дальних планов)
                    const lod2 = createBuildingMesh(b, 2);
                    
                    buildingGroup.push({ lod0, lod1, lod2, metadata: b.metadata, position });
                });
                
                return buildingGroup;
            }
            
            function createBuildingMesh(data, lod) {
                // Создаём геометрию здания с разным уровнем детализации
                const { width, depth, height } = data;
                const segments = lod === 0 ? 3 : lod === 1 ? 1 : 0;
                
                // Основной корпус
                const boxGeometry = new Cesium.BoxGeometry({
                    minimum: new Cesium.Cartesian3(-width/2, -depth/2, 0),
                    maximum: new Cesium.Cartesian3(width/2, depth/2, height)
                });
                
                // Добавляем детали для LOD0 (окна, выступы)
                let geometry = boxGeometry;
                if (lod === 0) {
                    // Добавляем имитацию окон (параллелепипеды на стенах)
                    const windowCount = Math.floor(width / 3);
                    // Упрощённо: просто делаем более сложную геометрию
                    const combined = [];
                    combined.push(boxGeometry);
                    
                    // Добавляем небольшие выступы (имитация окон)
                    for (let i = 0; i < windowCount; i++) {
                        const windowBox = new Cesium.BoxGeometry({
                            minimum: new Cesium.Cartesian3(-width/2 + i*3, -depth/2 - 0.2, 2 + i*1.5),
                            maximum: new Cesium.Cartesian3(-width/2 + i*3 + 1.5, -depth/2 + 0.2, 2 + i*1.5 + 2)
                        });
                        combined.push(windowBox);
                    }
                    
                    // Объединяем геометрию
                    geometry = Cesium.GeometryPipeline.combineGeometries({
                        geometries: combined
                    });
                }
                
                const geometryInstance = new Cesium.GeometryInstance({
                    geometry: geometry,
                    attributes: {
                        color: Cesium.ColorGeometryInstanceAttribute.fromCssColorString(data.color)
                    }
                });
                
                return geometryInstance;
            }
            
            // Генерируем здания
            const buildings = generateBuildingTileset();
            
            // Добавляем здания на сцену с LOD-переключением
            const buildingPrimitives = [];
            buildings.forEach((b, index) => {
                // Создаём примитив с LOD
                const primitive = new Cesium.Primitive({
                    geometryInstances: b.lod0,
                    appearance: new Cesium.PerInstanceColorAppearance({
                        flat: true,
                        translucent: false
                    }),
                    // LOD: используем разные геометрии в зависимости от расстояния
                    // В Cesium LOD реализуется через замену примитивов
                    // Для простоты используем один примитив с высоким полигонажем
                });
                
                // Сохраняем метаданные для кликов
                primitive._metadata = b.metadata;
                primitive._position = b.position;
                
                viewer.scene.primitives.add(primitive);
                buildingPrimitives.push(primitive);
                
                // Добавляем подписи для зданий
                if (index % 2 === 0) {
                    const label = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(
                            b.position.longitude + 0.0005,
                            b.position.latitude + 0.0005,
                            b.height + 10
                        ),
                        label: {
                            text: b.metadata.type,
                            font: '12px sans-serif',
                            fillColor: Cesium.Color.WHITE,
                            outlineColor: Cesium.Color.BLACK,
                            outlineWidth: 2,
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            pixelOffset: new Cesium.Cartesian2(0, -20)
                        }
                    });
                }
            });
            
            // ============================================================
            // 3. АНИМАЦИИ (движение транспорта, уровень воды)
            // ============================================================
            let animationsActive = true;
            let transportEntities = [];
            let waterLevel = 4.8;
            
            function createTrafficAnimation() {
                // Создаём движущиеся автомобили (точки)
                const trafficPoints = [
                    { lon: 21.8900, lat: 43.3180, speed: 0.0002 },
                    { lon: 21.8950, lat: 43.3220, speed: 0.00015 },
                    { lon: 21.9000, lat: 43.3160, speed: 0.00025 },
                    { lon: 21.8920, lat: 43.3200, speed: 0.00018 },
                ];
                
                trafficPoints.forEach((point, i) => {
                    const entity = viewer.entities.add({
                        position: Cesium.Cartesian3.fromDegrees(point.lon, point.lat, 1),
                        billboard: {
                            image: 'data:image/svg+xml,' + encodeURIComponent(
                                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                                    <circle cx="12" cy="12" r="10" fill="${['#4fc3f7','#ffb74d','#81c784','#ce93d8'][i]}" opacity="0.9"/>
                                    <circle cx="12" cy="12" r="4" fill="white" opacity="0.5"/>
                                </svg>`
                            ),
                            width: 16,
                            height: 16,
                            scaleByDistance: new Cesium.NearFarScalar(100, 1.0, 1000, 0.3)
                        },
                        _speed: point.speed,
                        _direction: i % 2 === 0 ? 1 : -1,
                        _lon: point.lon,
                        _lat: point.lat
                    });
                    
                    transportEntities.push(entity);
                });
            }
            
            function animateTraffic() {
                if (!animationsActive) return;
                
                transportEntities.forEach(entity => {
                    const pos = entity.position.getValue(new Cesium.JulianDate());
                    if (pos) {
                        const cartographic = Cesium.Cartographic.fromCartesian(pos);
                        let lon = cartographic.longitude + entity._speed * entity._direction;
                        let lat = cartographic.latitude + (entity._speed * 0.5) * (Math.random() - 0.5);
                        
                        // Ограничиваем движение
                        if (lon > 21.91 || lon < 21.88) entity._direction *= -1;
                        if (lat > 43.33 || lat < 43.30) entity._direction *= -1;
                        
                        entity.position = Cesium.Cartesian3.fromRadians(lon, lat, 1);
                    }
                });
            }
            
            function animateWaterLevel() {
                if (!animationsActive) return;
                
                // Имитация приливов/отливов
                waterLevel += (Math.random() - 0.5) * 0.05;
                waterLevel = Math.max(4.0, Math.min(5.5, waterLevel));
                document.getElementById('kpi-water').innerHTML = waterLevel.toFixed(1) + 'm';
            }
            
            // Создаём анимацию трафика
            createTrafficAnimation();
            
            // ============================================================
            // 4. УМНЫЕ МАТЕРИАЛЫ (WebGL шейдеры через Cesium)
            // ============================================================
            let shadersActive = false;
            
            function applySmartMaterials() {
                shadersActive = !shadersActive;
                document.getElementById('btn-shaders').classList.toggle('active');
                
                buildingPrimitives.forEach(primitive => {
                    if (shadersActive) {
                        // Применяем умный материал на основе энергопотребления
                        const energy = primitive._metadata?.energy || 'B';
                        const colorMap = {
                            'A+': '#4fc3f7',
                            'A': '#81c784',
                            'B+': '#ffb74d',
                            'B': '#ffa726',
                            'C': '#ef5350',
                            'D': '#d32f2f'
                        };
                        const color = colorMap[energy] || '#b0c4de';
                        
                        // Создаём кастомный материал с шейдером
                        const material = new Cesium.Material({
                            fabric: {
                                type: 'Color',
                                uniforms: {
                                    color: new Cesium.Color.fromCssColorString(color)
                                }
                            }
                        });
                        
                        // Добавляем свечение для энергоэффективных зданий
                        if (energy === 'A+' || energy === 'A') {
                            material.fabric.uniforms.color.alpha = 0.8;
                            // Добавляем эффект свечения (имитация)
                            primitive.appearance = new Cesium.PerInstanceColorAppearance({
                                flat: false,
                                translucent: true,
                                renderState: {
                                    blending: Cesium.BlendingState.ALPHA_BLEND
                                }
                            });
                        }
                        
                        // Меняем цвет
                        primitive.appearance = new Cesium.PerInstanceColorAppearance({
                            flat: true,
                            translucent: false
                        });
                        
                        // Обновляем цвет каждого экземпляра
                        const instances = primitive.geometryInstances;
                        if (Array.isArray(instances)) {
                            instances.forEach(instance => {
                                instance.attributes.color = 
                                    Cesium.ColorGeometryInstanceAttribute.fromCssColorString(color);
                            });
                        } else if (instances) {
                            instances.attributes.color = 
                                Cesium.ColorGeometryInstanceAttribute.fromCssColorString(color);
                        }
                    } else {
                        // Возвращаем оригинальные цвета
                        const instances = primitive.geometryInstances;
                        const originalColor = primitive._originalColor || '#4fc3f7';
                        if (Array.isArray(instances)) {
                            instances.forEach(instance => {
                                instance.attributes.color = 
                                    Cesium.ColorGeometryInstanceAttribute.fromCssColorString(originalColor);
                            });
                        } else if (instances) {
                            instances.attributes.color = 
                                Cesium.ColorGeometryInstanceAttribute.fromCssColorString(originalColor);
                        }
                    }
                });
            }
            
            // ============================================================
            // 5. 2D КАРТА (Leaflet)
            // ============================================================
            const map2d = L.map('map', {
                center: [43.3209, 21.8958],
                zoom: 15,
                zoomControl: false
            });
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map2d);
            
            // 2D маркеры
            const markers = [
                { lat: 43.3184, lng: 21.8892, name: 'Park Svetog Save', icon: 'fa-tree', color: '#4caf50' },
                { lat: 43.3142, lng: 21.8845, name: 'Nišava River', icon: 'fa-water', color: '#42a5f5' },
                { lat: 43.3124, lng: 21.8924, name: 'Niš Fortress', icon: 'fa-monument', color: '#ffb74d' },
                { lat: 43.3216, lng: 21.8935, name: 'Main Bus Station', icon: 'fa-bus', color: '#ffa726' },
                { lat: 43.3200, lng: 21.8910, name: 'Sensor AQI-01', icon: 'fa-microchip', color: '#ab47bc' },
            ];
            
            markers.forEach(m => {
                const icon = L.divIcon({
                    html: `<i class="fas ${m.icon}" style="color:${m.color};font-size:22px;"></i>`,
                    iconSize: [22, 22],
                    className: ''
                });
                const marker = L.marker([m.lat, m.lng], { icon }).addTo(map2d);
                marker.bindPopup(`<b>${m.name}</b>`);
            });
            
            // Heatmap
            const heatData = [
                [43.3209, 21.8958, 0.8], [43.3184, 21.8892, 0.5],
                [43.3245, 21.9033, 0.7], [43.3124, 21.8924, 0.9]
            ];
            const heatLayer = L.heatLayer(heatData, { radius: 25, blur: 15, minOpacity: 0.3 });
            let heatVisible = false;
            
            // ============================================================
            // 6. УПРАВЛЕНИЕ
            // ============================================================
            let is2dActive = false;
            
            // Переключение 2D/3D
            document.getElementById('btn-2d-toggle').addEventListener('click', function() {
                is2dActive = !is2dActive;
                document.getElementById('map').classList.toggle('active', is2dActive);
                this.classList.toggle('active', is2dActive);
                this.querySelector('.tooltip').textContent = is2dActive ? 'Switch to 3D' : 'Switch to 2D';
                
                if (is2dActive) {
                    viewer.scene.screenSpaceCameraController.enableRotate = false;
                    viewer.scene.screenSpaceCameraController.enableTranslate = false;
                    viewer.scene.screenSpaceCameraController.enableZoom = false;
                    cesiumContainer.style.opacity = '0.3';
                } else {
                    viewer.scene.screenSpaceCameraController.enableRotate = true;
                    viewer.scene.screenSpaceCameraController.enableTranslate = true;
                    viewer.scene.screenSpaceCameraController.enableZoom = true;
                    cesiumContainer.style.opacity = '1';
                }
            });
            
            // Zoom
            document.getElementById('btn-zoom-in').addEventListener('click', () => {
                if (is2dActive) {
                    map2d.zoomIn();
                } else {
                    viewer.camera.zoomIn(100);
                }
            });
            
            document.getElementById('btn-zoom-out').addEventListener('click', () => {
                if (is2dActive) {
                    map2d.zoomOut();
                } else {
                    viewer.camera.zoomOut(100);
                }
            });
            
            // Слои
            document.getElementById('btn-layers').addEventListener('click', () => {
                document.getElementById('layer-modal').classList.toggle('show');
            });
            
            document.getElementById('modal-close').addEventListener('click', () => {
                document.getElementById('layer-modal').classList.remove('show');
            });
            
            // Чекбоксы
            document.getElementById('chk-buildings').addEventListener('change', (e) => {
                buildingPrimitives.forEach(p => p.show = e.target.checked);
            });
            
            // Heatmap
            document.getElementById('btn-heat').addEventListener('click', function() {
                heatVisible = !heatVisible;
                this.classList.toggle('active');
                heatVisible ? heatLayer.addTo(map2d) : heatLayer.remove();
            });
            
            // Анимации
            document.getElementById('btn-animations').addEventListener('click', function() {
                animationsActive = !animationsActive;
                this.classList.toggle('active');
            });
            
            // Умные материалы
            document.getElementById('btn-shaders').addEventListener('click', applySmartMaterials);
            
            // Инфо-панель
            document.getElementById('btn-info-toggle').addEventListener('click', () => {
                document.getElementById('info-panel').classList.toggle('show');
            });
            
            // Временная шкала
            const modeBtns = ['mode-now', 'mode-history', 'mode-forecast'];
            modeBtns.forEach(id => {
                document.getElementById(id).addEventListener('click', function() {
                    modeBtns.forEach(b => document.getElementById(b).classList.remove('active'));
                    this.classList.add('active');
                    const year = id === 'mode-now' ? 2026 : id === 'mode-history' ? 2020 : 2030;
                    document.getElementById('year-slider').value = year;
                    document.getElementById('year-label').textContent = year;
                    
                    // Меняем цвета зданий для разных эпох
                    buildingPrimitives.forEach(p => {
                        const color = new Cesium.Color.fromCssColorString(
                            id === 'mode-now' ? '#4fc3f7' : 
                            id === 'mode-history' ? '#ffb74d' : '#81c784'
                        );
                        const instances = p.geometryInstances;
                        if (Array.isArray(instances)) {
                            instances.forEach(instance => {
                                instance.attributes.color = 
                                    Cesium.ColorGeometryInstanceAttribute.fromColor(color);
                            });
                        }
                    });
                });
            });
            
            document.getElementById('year-slider').addEventListener('input', function() {
                document.getElementById('year-label').textContent = this.value;
            });
            
            // Клики по объектам (3D picking)
            viewer.screenSpaceEventHandler.setInputAction(function(click) {
                const pickedObject = viewer.scene.pick(click.position);
                if (Cesium.defined(pickedObject) && pickedObject.primitive) {
                    const primitive = pickedObject.primitive;
                    const metadata = primitive._metadata;
                    if (metadata) {
                        document.getElementById('info-title').textContent = `📍 ${metadata.type}`;
                        document.getElementById('info-coords').textContent = 
                            `${(primitive._position.latitude * 180/Math.PI).toFixed(4)}° N, ${(primitive._position.longitude * 180/Math.PI).toFixed(4)}° E`;
                        document.getElementById('info-type').textContent = `🏛️ ${metadata.type}`;
                        document.getElementById('info-floors').textContent = metadata.floors;
                        document.getElementById('info-energy').textContent = metadata.energy;
                        document.getElementById('info-occupancy').textContent = `${metadata.occupancy}%`;
                        document.getElementById('info-visitors').textContent = `👥 ${metadata.visitors} today`;
                        document.getElementById('info-panel').classList.add('show');
                    }
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
            
            // ============================================================
            // 7. МИНИ-ГРАФИК
            // ============================================================
            const ctx = document.getElementById('miniChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00:00','04:00','08:00','12:00','16:00','20:00','23:00'],
                    datasets: [{
                        label: 'AQI (24h)',
                        data: [32, 38, 45, 42, 39, 35, 30],
                        borderColor: '#4fc3f7',
                        backgroundColor: 'rgba(79, 195, 247, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
            
            // ============================================================
            // 8. СИМУЛЯЦИЯ KPI
            // ============================================================
            setInterval(() => {
                document.getElementById('kpi-temp').innerHTML = (18 + Math.random() * 8).toFixed(1) + '°C';
                document.getElementById('kpi-aqi').innerHTML = Math.floor(30 + Math.random() * 40);
                document.getElementById('kpi-traffic').innerHTML = Math.floor(50 + Math.random() * 45) + '%';
                document.getElementById('kpi-energy').innerHTML = (0.8 + Math.random() * 1.0).toFixed(1) + 'MW';
                document.getElementById('kpi-incidents').innerHTML = Math.floor(Math.random() * 5);
            }, 4000);
            
            // ============================================================
            // 9. ЦИКЛ АНИМАЦИИ
            // ============================================================
            function animationLoop() {
                if (animationsActive) {
                    animateTraffic();
                    animateWaterLevel();
                }
                requestAnimationFrame(animationLoop);
            }
            
            animationLoop();
            
            console.log('🏙️ Niš Digital Twin v4.0 (CesiumJS) loaded');
            console.log('💡 Features:');
            console.log('  - 3D Tiles with LOD');
            console.log('  - Traffic & water animations');
            console.log('  - Smart materials (energy efficiency)');
            console.log('  - 2D/3D hybrid view');
            console.log('  - Real-time KPI dashboard');
            
        })();
    </script>
</body>
</html>
